name: Service Monitor

on:
  schedule:
    - cron: '*/10 * * * *'  # 每10分钟
  workflow_dispatch:          # 也支持手动触发

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run health checks
        id: checks
        run: |
          python3 scripts/check.py > data/status.json 2>data/error.log || true
          cat data/error.log || true
          echo "exit"

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/status.json
          git diff --cached --quiet || git commit -m "chore: update status $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
